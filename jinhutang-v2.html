<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>筋虎堂｜身體地圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{color-scheme:dark;
  --gold:#C9A84C;--gold-l:#E8C96A;--gold-d:#8A6E2F;
  --black:#0A0A0A;--dark2:#1A1A1A;--dark3:#252525;
  --text:#E8E0D0;--text-dim:#9A9080;
  --teal:#3BBFB0;--red:#E07060;
}
body{background:#0A0A0A!important;color:#E8E0D0!important;font-family:'Noto Sans TC',sans-serif;min-height:100vh}

.header{text-align:center;padding:22px 20px 14px;border-bottom:1px solid rgba(201,168,76,.15)}
.header-inner{display:flex;align-items:center;justify-content:center;gap:10px}
.logo{width:40px;height:40px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gold-d)}
.brand{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;color:var(--gold);letter-spacing:.15em}
.subtitle{font-size:12px;color:#9A9080;margin-top:3px}

.main{display:flex;height:calc(100vh - 86px);overflow:hidden}

/* 左側 */
.body-panel{
  flex:0 0 auto;width:320px;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 10px 10px;
  border-right:1px solid rgba(201,168,76,.1);
  overflow:hidden;
}
.view-toggle{display:flex;gap:7px;margin-bottom:10px}
.toggle-btn{
  padding:5px 18px;border:1px solid rgba(201,168,76,.3);border-radius:100px;
  background:transparent;color:#9A9080;font-size:12px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
}
.toggle-btn.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}
.body-hint{font-size:11px;color:#9A9080;margin-bottom:8px;text-align:center}

.body-container{position:relative;width:248px;height:454px;flex-shrink:0}
.body-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain}
.body-svg{position:absolute;top:0;left:0;width:100%;height:100%;cursor:pointer}

.zone{fill:rgba(201,168,76,0);stroke:rgba(201,168,76,0);stroke-width:1;transition:all .18s;cursor:pointer}
.zone:hover{fill:rgba(201,168,76,.28);stroke:rgba(201,168,76,.7)}
.zone.selected{fill:rgba(59,191,176,.3);stroke:var(--teal);stroke-width:1.5}

.selected-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;width:248px;min-height:24px}
.tag{
  background:rgba(59,191,176,.15);border:1px solid rgba(59,191,176,.4);
  color:var(--teal);font-size:11px;padding:3px 9px;border-radius:100px;
  display:flex;align-items:center;gap:4px;cursor:pointer;
}
.tag:hover{background:rgba(59,191,176,.25)}

/* 右側 */
.result-panel{flex:1;overflow-y:auto;padding:20px 22px 20px 22px;-webkit-overflow-scrolling:touch}
.result-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:#9A9080;text-align:center;gap:10px;
}
.result-empty-icon{font-size:44px;opacity:.25}
.result-empty-text{font-size:13px;line-height:1.9}

.multi-nav{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.nav-btn{
  padding:5px 13px;border:1px solid rgba(201,168,76,.25);border-radius:100px;
  background:transparent;color:#9A9080;font-size:12px;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;transition:all .2s;
}
.nav-btn.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}

.result-header{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
  padding-bottom:12px;border-bottom:1px solid rgba(201,168,76,.12);
}
.zone-name{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:700;color:var(--gold)}
.zone-meridian{
  font-size:11px;color:var(--teal);background:rgba(59,191,176,.1);
  border:1px solid rgba(59,191,176,.22);padding:3px 9px;border-radius:100px;
}
.section-title{
  font-size:10px;letter-spacing:.18em;color:#9A9080;text-transform:uppercase;
  margin-bottom:9px;display:flex;align-items:center;gap:8px;
}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.result-section{margin-bottom:18px}

.meridian-box{background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:13px}
.meridian-text{font-size:13px;color:#C8C0B0;line-height:1.85}

.point-cards{display:grid;gap:9px}
.point-card{
  background:var(--dark2);border:1px solid rgba(201,168,76,.1);
  border-radius:11px;padding:13px;border-left:3px solid var(--gold);
}
.point-name{font-size:14px;font-weight:500;color:var(--gold);margin-bottom:3px}
.point-loc{font-size:12px;color:#B0A890;margin-bottom:5px}
.point-effect{font-size:12px;color:var(--text);line-height:1.6}
.point-method{font-size:12px;color:#C8C0B0;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.05);line-height:1.6}
.point-method b{color:var(--teal)}

.action-box{background:#1A2A28;border:1px solid rgba(59,191,176,.3);border-radius:11px;padding:13px}
.action-text{font-size:13px;color:#E8E0D0!important;line-height:1.85}

.food-box{background:var(--dark2);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:13px}
.food-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px}
.food-label{font-size:11px;padding:2px 7px;border-radius:100px;flex-shrink:0;font-weight:500}
.food-label.good{background:rgba(59,191,176,.15);color:var(--teal)}
.food-label.bad{background:rgba(224,112,96,.12);color:var(--red)}
.food-text{font-size:12px;color:#C8C0B0;line-height:1.6}

.cta-box{
  background:#1C1608!important;
  border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:16px;
  text-align:center;margin-top:18px;
}
.cta-text{font-size:13px;color:#C8C0B0!important;margin-bottom:11px;line-height:1.7}
.cta-btn{
  display:block;width:100%;padding:12px;background:var(--gold);border:none;
  border-radius:10px;color:var(--black);font-family:'Noto Serif TC',serif;
  font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;
  transition:all .2s;
}
.cta-btn:hover{background:var(--gold-l)}
.disclaimer{font-size:11px;color:#504840;text-align:center;padding:10px 0 4px;line-height:1.7}

@media(max-width:660px){
  .main{flex-direction:column;height:auto;overflow:visible}
  .body-panel{width:100%;border-right:none;border-bottom:1px solid rgba(201,168,76,.1)}
  .result-panel{padding:14px}
}

/* ── 深入評估入口 ── */
.deep-dive-box{
  margin-top:14px;padding:14px 16px;
  background:#161E1D;
  border:1px solid rgba(59,191,176,.3);border-radius:11px;text-align:center;
}
.deep-dive-text{font-size:13px;color:#C8C0B0!important;margin-bottom:9px;line-height:1.6}
.deep-dive-btn{
  display:block;width:100%;padding:11px;
  background:transparent;border:1.5px solid var(--teal);
  border-radius:10px;color:var(--teal);font-family:'Noto Serif TC',serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .25s;
}
.deep-dive-btn:hover{background:rgba(59,191,176,.12);letter-spacing:.05em}

/* ── 評估面板（覆蓋在 result-panel 上） ── */
.assessment-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(10,10,10,.96);z-index:100;
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideUp .35s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.overlay-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;border-bottom:1px solid rgba(201,168,76,.12);flex-shrink:0;
}
.overlay-title{font-family:'Noto Serif TC',serif;font-size:16px;color:var(--gold)}
.overlay-close{
  background:transparent;border:1px solid rgba(255,255,255,.12);
  color:#9A9080;padding:5px 12px;border-radius:7px;cursor:pointer;
  font-size:12px;font-family:'Noto Sans TC',sans-serif;transition:all .2s;
}
.overlay-close:hover{border-color:rgba(255,255,255,.3);color:var(--text)}
.overlay-body{flex:1;overflow-y:auto;padding:20px 24px 40px}

/* ── 問卷元件 ── */
.ass-zones{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ass-zone-tag{background:rgba(59,191,176,.12);border:1px solid rgba(59,191,176,.3);color:var(--teal);font-size:11px;padding:3px 9px;border-radius:100px}
.ass-progress{display:flex;gap:4px;margin-bottom:18px}
.ass-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.08);transition:all .3s}
.ass-dot.done{background:var(--gold)}
.ass-dot.active{background:var(--gold);box-shadow:0 0 6px rgba(201,168,76,.5)}
.ass-q-label{font-size:10px;letter-spacing:.14em;color:#9A9080;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ass-q-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05)}
.ass-q-text{font-size:15px;font-family:'Noto Serif TC',serif;color:var(--text);margin-bottom:14px;line-height:1.7}
.ass-options{display:grid;gap:8px}
.ass-opt{display:flex;align-items:flex-start;gap:10px;background:var(--dark2);border:1px solid rgba(201,168,76,.1);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s;text-align:left;width:100%;font-family:'Noto Sans TC',sans-serif}
.ass-opt:hover{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.06)}
.ass-opt.selected{border-color:var(--gold);background:rgba(201,168,76,.1)}
.ass-opt.selected .ass-dot-sel{background:var(--gold);border-color:var(--gold)}
.ass-dot-sel{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);flex-shrink:0;margin-top:2px;transition:all .2s}
.ass-opt-title{font-size:13px;color:var(--text);font-weight:500;margin-bottom:2px}
.ass-opt-desc{font-size:11px;color:#9A9080;line-height:1.55}
.ass-supplement{width:100%;background:var(--dark2);border:1px solid rgba(201,168,76,.12);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;font-family:'Noto Sans TC',sans-serif;resize:none;margin-top:10px;transition:border-color .2s}
.ass-supplement:focus{outline:none;border-color:rgba(201,168,76,.4)}
.ass-supplement::placeholder{color:rgba(154,144,128,.45)}
.ass-nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.ass-back{background:transparent;border:1px solid rgba(255,255,255,.1);color:#9A9080;padding:9px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.ass-back:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.ass-next{background:var(--gold);border:none;color:var(--black);padding:9px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;transition:all .2s}
.ass-next:hover{background:var(--gold-l)}
.ass-next:disabled{background:#2E2E2E;color:rgba(255,255,255,.2);cursor:not-allowed}

/* ── 結果卡片 ── */
.res-hero{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(59,191,176,.04));border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:18px;margin-bottom:18px}
.res-type{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;margin-bottom:10px}
.res-type.economy{background:rgba(154,144,128,.15);border:1px solid rgba(154,144,128,.3);color:#B0A090}
.res-type.maintain{background:rgba(59,191,176,.1);border:1px solid rgba(59,191,176,.3);color:var(--teal)}
.res-type.urgent{background:rgba(224,112,96,.1);border:1px solid rgba(224,112,96,.3);color:var(--red)}
.res-hero-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--gold);margin-bottom:8px}
.res-hero-text{font-size:13px;color:var(--text);line-height:1.85}
.res-section{margin-bottom:18px}
.res-section-title{font-size:10px;letter-spacing:.18em;color:#9A9080;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.res-section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.res-card{background:var(--dark2);border:1px solid rgba(201,168,76,.1);border-radius:11px;padding:13px;margin-bottom:8px}
.res-card.highlight{border-color:rgba(201,168,76,.25);border-left:3px solid var(--gold)}
.res-card.urgent-card{border-color:rgba(224,112,96,.25);border-left:3px solid var(--red)}
.res-card-who{font-size:12px;font-weight:500;color:var(--text);margin-bottom:4px}
.res-card-desc{font-size:12px;color:#C8C0B0;line-height:1.65}
.res-role{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:100px;margin-top:7px}
.role-jht{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.role-other{background:rgba(59,191,176,.08);color:var(--teal);border:1px solid rgba(59,191,176,.15)}
.role-urgent{background:rgba(224,112,96,.08);color:var(--red);border:1px solid rgba(224,112,96,.15)}
.res-self{background:rgba(59,191,176,.06);border:1px solid rgba(59,191,176,.18);border-radius:11px;padding:13px;font-size:13px;color:#E8E0D0;line-height:1.9}
.res-freq{background:var(--dark2);border:1px solid rgba(201,168,76,.1);border-radius:11px;padding:13px;font-size:13px;color:#C8C0B0;line-height:1.8}
.res-freq b{color:var(--gold)}
.res-restart{background:transparent;border:1px solid rgba(255,255,255,.1);color:#9A9080;padding:8px 16px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .2s;display:block;margin:14px auto 0}
.res-restart:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px}
.loading-tiger{font-size:38px;animation:tigerpulse 1.4s ease-in-out infinite}
@keyframes tigerpulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.loading-label{font-size:13px;color:#9A9080;font-family:'Noto Serif TC',serif}
.loading-dots span{animation:dotblink 1.2s infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotblink{0%,80%,100%{opacity:.2}40%{opacity:1}}

</style>
</head>

let selected = new Set();

function switchView(v){
  ['front','back'].forEach(s=>{
    document.getElementById('img-'+s).style.display = s===v?'block':'none';
    document.getElementById('svg-'+s).style.display = s===v?'block':'none';
  });
  document.querySelectorAll('.toggle-btn').forEach((b,i)=>
    b.classList.toggle('active',(i===0&&v==='front')||(i===1&&v==='back')));
}

document.querySelectorAll('.zone').forEach(el=>{
  el.addEventListener('click',()=>{
    const id = el.dataset.id;
    if(!ZONES[id]) return;
    // 同一 data-id 的所有熱區一起切換
    const allSame = document.querySelectorAll('[data-id="'+id+'"]');
    if(selected.has(id)){
      selected.delete(id);
      allSame.forEach(e=>e.classList.remove('selected'));
    } else {
      selected.add(id);
      allSame.forEach(e=>e.classList.add('selected'));
    }
    renderTags();
    renderResult(id);
  });
});

function renderTags(){
  const c = document.getElementById('selected-tags');
  c.innerHTML=[...selected].map(id=>{
    const z=ZONES[id];
    return z?`<div class="tag" onclick="removeZone('${id}')">${z.name} ×</div>`:''
  }).join('');
}

function removeZone(id){
  selected.delete(id);
  document.querySelectorAll('[data-id="'+id+'"]').forEach(e=>e.classList.remove('selected'));
  renderTags();
  if(selected.size>0) renderResult([...selected][selected.size-1]);
  else { document.getElementById('result-empty').style.display='flex'; document.getElementById('result-content').style.display='none'; }
}

function renderResult(focusId){
  document.getElementById('result-empty').style.display='none';
  const content = document.getElementById('result-content');
  content.style.display='block';
  const ids=[...selected];

      const z=ZONES[id];

  html+=`
    <div class="result-header">

      <div class="zone-meridian">${z.meridian}</div>

    <div class="result-section">

        </div>`).join('')}

    </div>

        <div class="food-row"><div class="food-label bad">少食</div><div class="food-text">${z.food.bad}</div></div>
        ${z.food.habit?`<div class="food-row"><div class="food-label" style="background:rgba(180,140,60,.12);color:#C09040;border:none">注意</div><div class="food-text">${z.food.habit}</div></div>`:''}
        <div style="font-size:11px;color:#504840;margin-top:7px">以上為民俗食補參考，非醫療建議。</div>
      </div>
    </div>

      <div class="cta-text">想要針對這個部位進行專業手法調理？<br>筋虎堂提供到府與預約民俗調理服務（非醫療行為）</div>
      <a class="cta-btn" href="https://lin.ee/7xNuU0n" target="_blank">加入筋虎堂 LINE OA 預約</a>
    </div>
    <div class="disclaimer">民俗調理，非醫療行為。如有身體不適，請諮詢合格醫師。</div>
    <div class="deep-dive-box">
      <div class="deep-dive-text">以上是快速參考。想知道你的狀況應該怎麼處理、找誰、多久做一次？</div>
      <button class="deep-dive-btn" onclick="startAssessment()">🐯 取得我的個人化配套建議</button>

  content.innerHTML=html;

let assAnswers = {};

function startAssessment(){
  assAnswers = {};
  assStep = 0;
  document.getElementById('assessment-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  renderAssStep(0);
}

function closeAssessment(){
  document.getElementById('assessment-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

function renderAssStep(stepIdx){
  assStep = stepIdx;
  const q = ASS_QUESTIONS[stepIdx];
  const isMulti = q.multi || false;
  const currentAns = assAnswers[q.id] || (isMulti ? [] : null);

  const zoneTags = [...selected].map(id=>{
    const z = ZONES[id];
    return z ? `<span class="ass-zone-tag">${z.name}</span>` : '';
  }).join('');

  const dots = ASS_QUESTIONS.map((_,i)=>
    `<div class="ass-dot ${i<stepIdx?'done':i===stepIdx?'active':''}"></div>`
  ).join('');

  const optionsHTML = q.options.map(opt=>{
    const isSel = isMulti
      ? (Array.isArray(currentAns) && currentAns.includes(opt.val))
      : currentAns === opt.val;
    return `
      <button class="ass-opt ${isSel?'selected':''}" onclick="assSelectOpt('${q.id}','${opt.val}',${isMulti})">
        <div class="ass-dot-sel"></div>
        <div>
          <div class="ass-opt-title">${opt.title}</div>
          ${opt.desc ? `<div class="ass-opt-desc">${opt.desc}</div>` : ''}
        </div>
      </button>`;
  }).join('');

  const textHTML = q.hasText ? `
    <textarea class="ass-supplement" id="ass-text" rows="3" placeholder="${q.placeholder}">${assAnswers._supplement||''}</textarea>` : '';

  const canNext = isMulti
    ? (Array.isArray(currentAns) && currentAns.length > 0)
    : !!currentAns;

  document.getElementById('overlay-body').innerHTML = `
    <div class="ass-zones">${zoneTags}</div>
    <div class="ass-progress">${dots}</div>
    <div class="ass-q-label">${q.label}</div>
    <div class="ass-q-text">${q.text}</div>
    <div class="ass-options">${optionsHTML}</div>
    ${textHTML}
    <div class="ass-nav">
      <button class="ass-back" onclick="assGoBack(${stepIdx})">${stepIdx===0?'關閉':'上一題'}</button>
      <button class="ass-next" id="ass-next-btn" onclick="assGoNext(${stepIdx})" ${canNext?'':'disabled'}>
        ${stepIdx===ASS_QUESTIONS.length-1?'生成我的建議 →':'下一題 →'}
      </button>
    </div>`;
}

function assSelectOpt(qId, val, isMulti){
  const txt = document.getElementById('ass-text');
  if(txt) assAnswers._supplement = txt.value;
  if(isMulti){
    if(!assAnswers[qId]) assAnswers[qId] = [];
    const idx = assAnswers[qId].indexOf(val);
    if(idx>=0) assAnswers[qId].splice(idx,1);
    else assAnswers[qId].push(val);
  } else {
    assAnswers[qId] = val;
  }
  renderAssStep(assStep);
}

function assGoBack(stepIdx){
  const txt = document.getElementById('ass-text');
  if(txt) assAnswers._supplement = txt.value;
  if(stepIdx === 0){ closeAssessment(); }
  else { renderAssStep(stepIdx - 1); }
}

function assGoNext(stepIdx){
  const txt = document.getElementById('ass-text');
  if(txt) assAnswers._supplement = txt.value;
  if(stepIdx === ASS_QUESTIONS.length - 1){
    showAssLoading();
    generateAssessmentResult();
  } else {
    renderAssStep(stepIdx + 1);
  }
}

function showAssLoading(){ /* 靜態版不需要 loading */ }

function generateAssessmentResult(){
  const zoneList = [...selected].map(id=>ZONES[id]?.name||id).join('、');

  const budget   = assAnswers.budget    || 'none';
  const tried    = assAnswers.tried     || [];
  const supplement = assAnswers._supplement || '';

  const result = buildResult(urgency, lifestyle, budget, tried, supplement, zoneList);

}

        selfCare:`每天 5 分鐘的維護習慣：

② 工作中每小時做一次肩胛骨後夾 10 下
③ 睡前針對今天最緊繃的部位做 30 秒靜態伸展`,
        frequency:`你已經有定期保養的習慣，這個節奏很好。建議每 2–4 週做一次深層調理，感覺特別緊繃的時候可以縮短到每 2 週一次。`,
        closingNote:`主動照顧身體的人，老了才會知道這件事有多值得。`
      };
    }
    return {
      userType:'maintain',
      typeBadge:'預防意識型',
      heroText:`你現在沒有明顯不舒服，這是最好的保養時機。等到痛了才處理，代價會大很多——不管是時間、金錢、還是你要忍受的不適感。`,
      urgentNote:'',
      protocols:[
        {
          who:'建立基礎保養頻率',
          role:'jht',
          roleLabel:'筋虎堂民俗調理',
          desc:'每 3–4 週一次的全身性調理，讓肌肉維持在有彈性、不積滯的狀態。不需要每次都有症狀才來，就像車子的定期保養，預防比修理便宜。',

        }
      ],
      selfCare:`從今天開始的最小習慣：

③ 找出你身體最緊的一個部位，每晚按壓 30 秒`,

      closingNote:`現在開始保養，是對未來的自己最好的投資。`
    };
  }

  // ══════════════════════════════════════
  // 慢性路徑（最多人的狀況）
  // ══════════════════════════════════════

  // 省錢型
  if(budget === 'none'){
    return {
      userType:'economy',
      typeBadge:'省錢保命型',
      heroText:`你習慣了這個不舒服，但「習慣了」不代表沒有代價——身體在用你察覺不到的方式代償，某一天它會用一個你更難忽視的方式提醒你。我知道你不想花錢，所以我先給你能自己做的事。`,
      urgentNote:'',
      protocols:[
        {
          who:'先把自救動作做到位',
          role:'other',
          roleLabel:'自救優先',
          desc:'很多慢性緊繃在早期是可以靠自救控制的。每天 5–10 分鐘針對性的按壓和伸展，比什麼都不做要好得多。下面的自救動作是你現在就可以開始的。',
          isMain:false
        },
        {
          who:'當自救控制不住的時候',
          role:'jht',
          roleLabel:'筋虎堂民俗調理',
          desc:'如果自救 2–3 週後沒有明顯改善，或者不舒服開始影響到睡眠和工作，就是外力介入的時機。一次調理的費用比長期忍受的代價小很多。',
          isMain:true
        }
      ],
      selfCare:`今天就能做的三件事：
① 針對最不舒服的部位，用拇指深壓到有痠脹感，維持 20 秒，重複 3 次
② 做 5 次深呼吸，讓身體從緊繃狀態切換出來
③ 今晚睡前，把這個部位的對應伸展做一次（點左側身體地圖查看）`,
      frequency:`先從自救開始，如果 2–3 週後沒有改善，安排一次調理。花小錢處理，比拖到嚴重後花大錢划算。`,
      closingNote:`你願意花時間了解自己的身體，這件事本身就很重要。`
    };

  // 偶爾保養 × 不改變習慣
  if(budget === 'occasionally' && lifestyle === 'no'){
    return {
      userType:'maintain',
      typeBadge:'被動應對型',
      heroText:`你的模式是：不舒服了才處理，處理完繼續撐。這不是壞事，但這樣的效率很低——每次都是從惡化的狀態開始修復，消耗的時間和金錢都更多。我們來看看怎麼讓這個循環更有效率。`,
      urgentNote:'',
      protocols:[
        {
          who:'把「被動應對」升級成「定期維護」',
          role:'jht',
          roleLabel:'筋虎堂民俗調理',
          desc:'你現在的模式是症狀嚴重才處理，等到那個程度通常需要 2–3 次才能恢復。如果改成每 3–4 週固定一次，每次費用差不多，但總費用反而更少，身體狀態也更穩定。',
          isMain:true
        },
        {
          who:'工作習慣沒辦法改，那就加強修復',
          role:'other',
          roleLabel:'搭配自救習慣',
          desc:'久坐、久站是現實，無法改變。但可以在每天固定時間做 5 分鐘的針對性放鬆，把損耗的速度降低。不是改變生活，是在既有的生活裡加一個緩衝。',
          isMain:false
        }
      ],
      selfCare:`工作中能做的微習慣：
① 每坐 45 分鐘，站起來做 3 次深呼吸 + 肩頸轉動
② 午休時用 5 分鐘按壓今天最緊的部位
③ 下班後做 1 次針對性伸展，10 分鐘以內`,
      frequency:`建議從每 3–4 週一次開始，感受看看定期調理和被動應對的差別。通常試過 2–3 次後，大部分人會覺得值得繼續。`,
      closingNote:`生活習慣可以不變，但照顧身體的方式可以更聰明。`
    };
  }

  // 偶爾保養 × 想改但很難 / 已在調整
  if(budget === 'occasionally'){
    return {
      userType:'maintain',
      typeBadge:'調整中保養型',
      heroText:`你有在做一些改變，這需要意志力。但改變生活習慣的過程中，身體會有一段適應期——舊的緊繃需要時間釋放，新的動作模式需要時間建立。這段期間，外力支撐會讓你的努力更有效率。`,
      urgentNote:'',
      protocols:[
        {
          who:'搭配調理加速適應期',
          role:'jht',
          roleLabel:'筋虎堂民俗調理',
          desc:'你在改變姿勢或習慣的過程中，肌肉會有新的緊繃點出現。定期調理可以幫助肌肉更快適應新的使用模式，讓你的努力不白費。建議每 2–3 週配合一次。',
          isMain:true
        },
        {
          who:'確認改變的方向是對的',
          role:'other',
          roleLabel:'物理治療師評估',
          desc:'如果你已經在做運動或調整姿勢，但效果不明顯，有可能是動作模式還需要微調。找物理治療師做一次評估，確認你的努力是往對的方向走。',
          isMain:false
        }
      ],
      selfCare:`幫助適應期的三件事：
① 新動作剛開始做時，速度放慢，讓身體有時間感受

③ 不舒服的地方不要硬撐，停下來按壓 30 秒再繼續`,
      frequency:`調整習慣期間建議每 2–3 週做一次調理，等到新習慣穩定後可以拉長到 3–4 週。`,

  }

  // 定期保養 × 慢性
  return {
    userType:'maintain',
    typeBadge:'聰明保養型',
    heroText:`你已經有定期保養的習慣，而且長期都這樣了還願意主動處理，這說明你對自己的身體有一定的認識。現在要做的不是更努力，而是更精準——找出為什麼一直好不了的根本原因。`,
    urgentNote:'',

      {
        who:'深入評估慢性問題的根源',
        role:'other',
        roleLabel:'物理治療師・功能性評估',

        isMain:false
      },
      {
        who:'調整調理的重點和頻率',
        role:'jht',
        roleLabel:'筋虎堂民俗調理',
        desc:'你的狀況需要更針對性的處理，不只是全身放鬆。每次調理前可以告訴我這週最困擾你的部位和動作，讓每次調理的重點更精準。',
        isMain:true
      }
    ],
    selfCare:`提升保養品質的方法：
① 開始記錄身體日誌：每天哪個部位最緊、在什麼情況下加重
② 調理前後各做一次相同的動作，感受差異
③ 找出你一天中身體最放鬆和最緊繃的時間點`,
    frequency:`你已經有定期保養了，現在重點是提升每次的品質。建議把頻率維持在每 2–3 週，但每次都帶著更具體的問題來。`,
    closingNote:`保養了這麼久，是時候讓效果更精準了。`
  };
}

function renderAssResult(r){
  const zoneList = [...selected].map(id=>ZONES[id]?.name||id).join('、');
  const typeClass = {economy:'economy',maintain:'maintain',urgent:'urgent'}[r.userType]||'maintain';

  const urgentHTML = r.urgentNote ? `
    <div class="res-section">
      <div class="res-section-title">⚠️ 特別提醒</div>
      <div class="res-card urgent-card">
        <div class="res-card-desc">${r.urgentNote}</div>
        <div class="res-role role-urgent">🏥 建議先就醫</div>
      </div>
    </div>` : '';

  const protocolsHTML = (r.protocols||[]).map(p=>{
    const rc = {jht:'role-jht',other:'role-other',urgent:'role-urgent'}[p.role]||'role-other';
    return `<div class="res-card ${p.isMain?'highlight':''}">
      <div class="res-card-who">${p.who}</div>
      <div class="res-card-desc">${p.desc}</div>
      <div class="res-role ${rc}">✦ ${p.roleLabel}</div>
    </div>`;
  }).join('');

  const selfCareHTML = r.selfCare.replace(/\n/g,'<br>').replace(/①/g,'<b>①</b>').replace(/②/g,'<b>②</b>').replace(/③/g,'<b>③</b>');

  document.getElementById('overlay-body').innerHTML = `
    <div class="res-hero">
      <div class="res-type ${typeClass}">${r.typeBadge}</div>
      <div class="res-hero-title">${zoneList}</div>
      <div class="res-hero-text">${r.heroText}</div>
    </div>
    ${urgentHTML}
    <div class="res-section">
      <div class="res-section-title">建議配套流程</div>
      ${protocolsHTML}
    </div>
    <div class="res-section">
      <div class="res-section-title">今天就能做的自救</div>
      <div class="res-self">${selfCareHTML}</div>
    </div>
    <div class="res-section">
      <div class="res-section-title">頻率與長期規劃</div>
      <div class="res-freq">${r.frequency}</div>
    </div>
    <div class="cta-box" style="margin-top:4px">
      <div class="cta-text">${r.closingNote}<br>筋虎堂提供到府與預約民俗調理服務（非醫療行為）</div>
      <a class="cta-btn" href="https://lin.ee/7xNuU0n" target="_blank">加入筋虎堂 LINE OA 預約</a>
    </div>
    <div class="disclaimer">民俗調理，非醫療行為。急性疼痛、麻木、無力請先就醫確認。</div>
    <button class="res-restart" onclick="restartAss()">重新評估</button>`;
}

function restartAss(){
  assAnswers = {};
  assStep = 0;
  renderAssStep(0);
}
